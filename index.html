<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brick Breaker - Casual Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fef7e5 0%, #f1e4c3 100%);
            --primary: #ff6b6b;
            --primary-hover: #ff5252;
            --secondary: #4ecdc4;
            --gold: #feca57;
            --text-dark: #2c3e50;
            --text-light: #7f8c8d;
            --card-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 12px 32px rgba(184, 160, 110, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            height: 100dvh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .screen {
            position: absolute;
            width: calc(100% - 32px);
            height: calc(100% - 32px);
            max-width: 450px;
            max-height: 750px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 4px solid #fff;
            padding: 32px 24px;
            text-align: center;
            z-index: 10;
        }

        .screen.active {
            display: flex;
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.92); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            pointer-events: none;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.8rem;
            color: var(--primary);
            text-shadow: 2px 2px 0px #fff, 5px 5px 0px rgba(0,0,0,0.04);
            margin-bottom: 12px;
            line-height: 1.1;
            pointer-events: auto;
            animation: titleFloat 3s ease-in-out infinite;
        }

        .victory-title {
            color: var(--gold) !important;
            font-size: 3.2rem;
            text-shadow: 2px 2px 0px #fff, 5px 5px 0px rgba(254, 202, 87, 0.2);
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        p {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 700;
            margin-bottom: 32px;
            max-width: 290px;
            line-height: 1.5;
            pointer-events: auto;
        }

        .btn {
            font-family: 'Fredoka One', cursive;
            font-size: 1.5rem;
            padding: 16px 50px;
            border: none;
            border-radius: 24px;
            background: var(--secondary);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0px #34b0a7, 0 10px 20px rgba(78, 205, 196, 0.35);
            transition: transform 0.05s, box-shadow 0.05s;
            outline: none;
            pointer-events: auto;
        }

        .btn.gold-btn {
            background: var(--gold);
            box-shadow: 0 6px 0px #e1b13c, 0 10px 20px rgba(254, 202, 87, 0.4);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #34b0a7, 0 4px 10px rgba(78, 205, 196, 0.35);
        }

        .btn.gold-btn:active {
            box-shadow: 0 2px 0px #e1b13c, 0 4px 10px rgba(254, 202, 87, 0.4);
        }

        #game-screen {
            background: transparent;
            box-shadow: none;
            border: none;
            padding: 0;
            justify-content: flex-start;
            width: 100%;
            height: 100%;
            max-width: 450px;
        }

        #game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 3px solid #fff;
            margin-bottom: 12px;
        }

        .hud-item {
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud-value {
            color: #ff9f43;
        }

        #hearts-container {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .heart {
            width: 22px;
            height: 22px;
            fill: var(--primary);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.5), opacity 0.2s;
        }

        .heart.lost {
            transform: scale(0);
            opacity: 0;
        }

        #canvas-container {
            flex: 1;
            width: 100%;
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: var(--shadow);
            border: 4px solid #fff;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 22px;
        }

        #celebrationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
        }

        .score-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .score-value {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 24px;
        }

        .audio-toggle {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            border: 2px solid #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .audio-toggle svg {
            width: 22px;
            height: 22px;
            fill: var(--text-dark);
        }
        
        .screen-shake {
            animation: shake 0.15s infinite;
        }
        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(-1px, -2px) rotate(-1deg); }
        }

        .crown-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: crownPulse 1.5s ease-in-out infinite;
        }
        @keyframes crownPulse {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.15) rotate(5deg); }
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="audio-toggle" id="mute-btn" onclick="toggleMute()">
            <svg id="sound-on-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.25-2.5-4.01v8.03c1.48-.76 2.5-2.24 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <svg id="sound-off-icon" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.25-2.5-4.01v2.21l2.45 2.45c.03-.22.05-.43.05-.65zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </div>

        <div class="screen active" id="start-screen" style="padding:0; overflow:hidden;">
            <canvas id="menuCanvas" style="width:100%; height:100%;"></canvas>
            <div id="menu-overlay">
                <h1>BRICK<br>BREAKOUT</h1>
                <p>Drag your mouse/finger or use Arrow keys to move the paddle. Smash all the bricks to win!</p>
                <button class="btn" onclick="startGame()">PLAY</button>
            </div>
        </div>

        <div class="screen" id="game-screen">
            <div id="game-header">
                <div class="hud-item">SCORE <span class="hud-value" id="live-score">0</span></div>
                <div id="hearts-container">
                    <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 21 5.42 21 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 21 5.42 21 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <svg class="heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.5 3 21 5.42 21 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
            </div>
            <div id="canvas-container">
                <canvas id="gameCanvas"></canvas>
            </div>
        </div>

        <div class="screen" id="end-screen">
            <h1 id="end-title">GAME OVER</h1>
            <div class="score-label">Your Score</div>
            <div class="score-value" id="final-score">0</div>
            <div class="score-label" style="font-size:0.8rem; color:var(--text-light);">Best Score</div>
            <div class="score-value" id="high-score" style="font-size:1.6rem; margin-bottom:32px; color:var(--secondary);">0</div>
            <button class="btn" id="restart-btn" onclick="startGame()">RESTART</button>
        </div>

        <div class="screen" id="celebration-screen" style="overflow:hidden;">
            <canvas id="celebrationCanvas"></canvas>
            <div class="crown-icon">👑</div>
            <h1 class="victory-title">VICTORY!</h1>
            <p style="color: var(--text-dark); margin-bottom: 16px;">You smashed every single brick!</p>
            <div class="score-label">Final Score</div>
            <div class="score-value" id="victory-score" style="color: var(--secondary); margin-bottom: 32px;">0</div>
            <button class="btn gold-btn" onclick="startGame()" style="z-index:12;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // --- Web Audio Framework ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuCanvas = document.getElementById('menuCanvas');
        const mctx = menuCanvas.getContext('2d');
        const celebCanvas = document.getElementById('celebrationCanvas');
        const cctx = celebCanvas.getContext('2d');

        let isMuted = localStorage.getItem('brick_muted') === 'true';
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (isMuted) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'paddle') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(280, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'brick') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(380, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(620, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'wall') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            } else if (type === 'win') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.16); 
                osc.frequency.setValueAtTime(1046.50, audioCtx.currentTime + 0.24); 
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(320, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            }
        }

        function updateMuteUI() {
            document.getElementById('sound-on-icon').style.display = isMuted ? 'none' : 'block';
            document.getElementById('sound-off-icon').style.display = isMuted ? 'block' : 'none';
        }
        updateMuteUI();

        function toggleMute() {
            isMuted = !isMuted;
            localStorage.setItem('brick_muted', isMuted);
            updateMuteUI();
            playSound('click');
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- Core Engine States ---
        let score = 0;
        let lives = 3;
        let animationFrameId;
        let menuAnimationFrameId;
        let celebAnimationFrameId;
        let gameActive = false;

        let isRespawning = false;
        let respawnTimer = 0;
        let ballVisible = true;

        // FIXED VIRTUAL SYSTEM RESOLUTION (Forces uniform circles everywhere)
        const V_WIDTH = 400;
        const V_HEIGHT = 600; 
        
        let paddle = { x: 0, y: V_HEIGHT - 35, width: 84, height: 12, speed: 7 };
        
        // Manual Speed Configurations optimized for the 400x600 resolution grid
        let ball = { 
            x: 0, 
            y: 0, 
            radius: 7, 
            dx: 0, 
            dy: 0, 
            currentSpeed: 4.5, 
            minSpeed: 4.5,     
            maxSpeed: 7.5      
        };
        
        let bricks = [];
        let totalBricksCount = 0;
        let brokenBricksCount = 0;
        const brickConfig = { rows: 5, cols: 6, padding: 8, marginTop: 45, height: 16 };
        const brickColors = ['#ff6b6b', '#ff9f43', '#feca57', '#1dd1a1', '#10ac84'];

        let rightPressed = false;
        let leftPressed = false;
        let lastInputX = null;
        let isDragging = false;

        // --- Start Screen Background Engine ---
        let menuBall = { x: 200, y: 350, dx: 1.8, dy: -1.8, radius: 8, speed: 2.2 };
        let menuPaddle = { x: 150, y: 460, width: 100, height: 10 };
        let menuParticles = [];
        let menuBricks = [];
        let celebConfetti = [];

        function initMenuVisuals() {
            const rect = document.getElementById('start-screen').getBoundingClientRect();
            menuCanvas.width = rect.width;
            menuCanvas.height = rect.height;

            menuBricks = [];
            const cols = 5;
            const rows = 4;
            const pad = 10;
            const bW = (rect.width - (pad * (cols + 1))) / cols;
            const bH = 15;

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    menuBricks.push({
                        x: pad + c * (bW + pad),
                        y: 40 + r * (bH + pad),
                        width: bW,
                        height: bH,
                        color: brickColors[r % brickColors.length],
                        status: 1
                    });
                }
            }
            
            menuBall.x = rect.width / 2;
            menuBall.y = rect.height / 2 + 50;
            menuPaddle.width = 110;
            menuPaddle.y = rect.height - 40;

            menuParticles = [];
            for (let i = 0; i < 15; i++) {
                menuParticles.push({
                    x: Math.random() * rect.width,
                    y: Math.random() * rect.height,
                    radius: Math.random() * 4 + 2,
                    speedY: -(Math.random() * 0.3 + 0.1),
                    alpha: Math.random() * 0.2 + 0.1
                });
            }
        }

        function updateMenuBackground() {
            const w = menuCanvas.width;
            const h = menuCanvas.height;
            mctx.clearRect(0, 0, w, h);

            menuParticles.forEach(p => {
                p.y += p.speedY;
                if (p.y < -10) p.y = h + 10;
                mctx.fillStyle = `rgba(78, 205, 196, ${p.alpha})`;
                mctx.beginPath();
                mctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                mctx.fill();
            });

            let aliveBricks = 0;
            menuBricks.forEach(b => {
                if (b.status === 1) {
                    aliveBricks++;
                    mctx.fillStyle = b.color;
                    mctx.globalAlpha = 0.2;
                    mctx.beginPath();
                    mctx.roundRect(b.x, b.y, b.width, b.height, 4);
                    mctx.fill();
                    mctx.globalAlpha = 1.0;
                }
            });

            if (aliveBricks === 0) menuBricks.forEach(b => b.status = 1);

            let targetX = menuBall.x - menuPaddle.width / 2;
            menuPaddle.x += (targetX - menuPaddle.x) * 0.08;
            if (menuPaddle.x < 0) menuPaddle.x = 0;
            if (menuPaddle.x + menuPaddle.width > w) menuPaddle.x = w - menuPaddle.width;

            mctx.fillStyle = 'rgba(78, 205, 196, 0.25)';
            mctx.beginPath();
            mctx.roundRect(menuPaddle.x, menuPaddle.y, menuPaddle.width, menuPaddle.height, 5);
            mctx.fill();

            menuBall.x += menuBall.dx;
            menuBall.y += menuBall.dy;

            if (menuBall.x < menuBall.radius || menuBall.x > w - menuBall.radius) menuBall.dx = -menuBall.dx;
            if (menuBall.y < menuBall.radius) menuBall.dy = -menuBall.dy;

            if (menuBall.y > menuPaddle.y - menuBall.radius && menuBall.x > menuPaddle.x && menuBall.x < menuPaddle.x + menuPaddle.width) {
                menuBall.dy = -menuBall.speed;
                menuBall.y = menuPaddle.y - menuBall.radius;
            }

            menuBricks.forEach(b => {
                if (b.status === 1) {
                    if (menuBall.x + menuBall.radius > b.x && menuBall.x - menuBall.radius < b.x + b.width &&
                        menuBall.y + menuBall.radius > b.y && menuBall.y - menuBall.radius < b.y + b.height) {
                        b.status = 0;
                        menuBall.dy = -menuBall.dy;
                    }
                }
            });

            if (menuBall.y > h + 20) {
                menuBall.x = w / 2;
                menuBall.y = h / 2;
                menuBall.dy = -menuBall.speed;
            }

            mctx.fillStyle = 'rgba(255, 107, 107, 0.35)';
            mctx.beginPath();
            mctx.arc(menuBall.x, menuBall.y, menuBall.radius, 0, Math.PI * 2);
            mctx.fill();

            if (!gameActive) {
                menuAnimationFrameId = requestAnimationFrame(updateMenuBackground);
            }
        }

        function initCelebrationVisuals() {
            const rect = document.getElementById('celebration-screen').getBoundingClientRect();
            celebCanvas.width = rect.width;
            celebCanvas.height = rect.height;

            celebConfetti = [];
            const colors = ['#ff6b6b', '#4ecdc4', '#feca57', '#1dd1a1', '#ff9f43', '#a29bfe'];
            
            for (let i = 0; i < 100; i++) {
                celebConfetti.push({
                    x: Math.random() * rect.width,
                    y: Math.random() * rect.height - rect.height,
                    size: Math.random() * 6 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedY: Math.random() * 2 + 2,
                    speedX: Math.random() * 2 - 1,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 4 - 2
                });
            }
        }

        function updateCelebrationBackground() {
            const w = celebCanvas.width;
            const h = celebCanvas.height;
            cctx.clearRect(0, 0, w, h);

            celebConfetti.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += p.rotationSpeed;

                if (p.y > h) {
                    p.y = -10;
                    p.x = Math.random() * w;
                }

                cctx.save();
                cctx.translate(p.x, p.y);
                cctx.rotate(p.rotation * Math.PI / 180);
                cctx.fillStyle = p.color;
                
                if (p.size > 7) {
                    cctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                } else {
                    cctx.beginPath();
                    cctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
                    cctx.fill();
                }
                cctx.restore();
            });

            celebAnimationFrameId = requestAnimationFrame(updateCelebrationBackground);
        }

        function updateHeartsUI() {
            const hearts = document.querySelectorAll('.heart');
            hearts.forEach((heart, idx) => {
                if (idx >= lives) {
                    heart.classList.add('lost');
                } else {
                    heart.classList.remove('lost');
                }
            });
        }

        // UNIVERSAL ASPECT-RATIO ENGINE: Letterboxes container space perfectly across wide/tall views
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            if (!container) return;
            const rect = container.getBoundingClientRect();
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            
            // Computes maximum possible uniform scale factor fitting internal parameters
            const scaleX = rect.width / V_WIDTH;
            const scaleY = rect.height / V_HEIGHT;
            const finalScale = Math.min(scaleX, scaleY);
            
            const displayWidth = V_WIDTH * finalScale;
            const displayHeight = V_HEIGHT * finalScale;

            // Apply locked box constraints to the canvas style sheet directly
            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
            
            canvas.width = displayWidth * dpr;
            canvas.height = displayHeight * dpr;
            
            ctx.resetTransform();
            ctx.scale(finalScale * dpr, finalScale * dpr);
        }
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            if(!gameActive) initMenuVisuals();
        });

        function startGame() {
            if (menuAnimationFrameId) cancelAnimationFrame(menuAnimationFrameId);
            if (celebAnimationFrameId) cancelAnimationFrame(celebAnimationFrameId);
            
            gameActive = true;
            isRespawning = false;
            playSound('click');
            switchScreen('game-screen');
            
            setTimeout(() => {
                resizeCanvas(); 
                score = 0;
                lives = 3;
                brokenBricksCount = 0;
                ball.currentSpeed = ball.minSpeed;
                
                document.getElementById('live-score').innerText = score;
                updateHeartsUI();

                paddle.width = 84;
                paddle.x = (V_WIDTH - paddle.width) / 2;

                resetBallPosition();

                bricks = [];
                const availableWidth = V_WIDTH - (brickConfig.padding * (brickConfig.cols + 1));
                const brickWidth = availableWidth / brickConfig.cols;
                totalBricksCount = brickConfig.rows * brickConfig.cols;

                for (let r = 0; r < brickConfig.rows; r++) {
                    bricks[r] = [];
                    for (let c = 0; c < brickConfig.cols; c++) {
                        bricks[r][c] = {
                            x: brickConfig.padding + c * (brickWidth + brickConfig.padding),
                            y: brickConfig.marginTop + r * (brickConfig.height + brickConfig.padding),
                            width: brickWidth,
                            height: brickConfig.height,
                            status: 1,
                            color: brickColors[r % brickColors.length]
                        };
                    }
                }

                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                animationFrameId = requestAnimationFrame(gameLoop);
            }, 60);
        }

        function resetBallPosition() {
            ball.x = paddle.x + paddle.width / 2;
            ball.y = paddle.y - ball.radius - 2;
            
            let angle = -Math.PI / 4 - (Math.random() * Math.PI / 2); 
            ball.dx = Math.cos(angle) * ball.currentSpeed;
            ball.dy = Math.sin(angle) * ball.currentSpeed;
        }

        function triggerRespawn() {
            lives--;
            updateHeartsUI();
            
            if (lives <= 0) {
                endGame(false);
            } else {
                playSound('lose');
                isRespawning = true;
                respawnTimer = performance.now();
                ballVisible = true;
                resetBallPosition();
            }
        }

        // Maps client window viewport pixels back to fixed virtual coordinate bounds safely
        function getVirtualX(clientX) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = V_WIDTH / rect.width;
            return (clientX - rect.left) * scaleX;
        }

        // --- Keyboard Controls ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') rightPressed = true;
            if (e.key === 'Left' || e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') leftPressed = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Right' || e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') rightPressed = false;
            if (e.key === 'Left' || e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') leftPressed = false;
        });

        // --- Touch Drag Mechanics (Mobile & Tablets) ---
        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            lastInputX = getVirtualX(e.touches[0].clientX);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!gameActive || lastInputX === null) return;
            const currentX = getVirtualX(e.touches[0].clientX);
            paddle.x += (currentX - lastInputX);
            lastInputX = currentX;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > V_WIDTH) paddle.x = V_WIDTH - paddle.width;
        }, { passive: true });

        window.addEventListener('touchend', () => {
            lastInputX = null;
        }, { passive: true });

        // --- Mouse Drag Mechanics (Desktop & Widescreen Monitors) ---
        window.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            isDragging = true;
            lastInputX = getVirtualX(e.clientX);
        });

        window.addEventListener('mousemove', (e) => {
            if (!gameActive || !isDragging || lastInputX === null) return;
            const currentX = getVirtualX(e.clientX);
            paddle.x += (currentX - lastInputX);
            lastInputX = currentX;
            if (paddle.x < 0) paddle.x = 0;
            if (paddle.x + paddle.width > V_WIDTH) paddle.x = V_WIDTH - paddle.width;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            lastInputX = null;
        });

        // --- Game Physics ---
        function runPhysicsStep() {
            if (rightPressed && paddle.x < V_WIDTH - paddle.width) paddle.x += paddle.speed;
            if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;

            if (isRespawning) {
                let elapsed = performance.now() - respawnTimer;
                ballVisible = Math.floor(elapsed / 100) % 2 === 0;
                
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius - 2;

                if (elapsed >= 1000) { 
                    isRespawning = false;
                    ballVisible = true;
                    resetBallPosition();
                }
                return; 
            }

            let nextX = ball.x + ball.dx;
            let nextY = ball.y + ball.dy;

            if (nextX < ball.radius) {
                ball.x = ball.radius;
                ball.dx = -ball.dx;
                playSound('wall');
            } else if (nextX > V_WIDTH - ball.radius) {
                ball.x = V_WIDTH - ball.radius;
                ball.dx = -ball.dx;
                playSound('wall');
            } else {
                ball.x = nextX;
            }

            if (nextY < ball.radius) {
                ball.y = ball.radius;
                ball.dy = -ball.dy;
                playSound('wall');
            } else if (nextY > paddle.y - ball.radius && ball.y <= paddle.y + paddle.height) {
                if (ball.x >= paddle.x && ball.x <= paddle.x + paddle.width) {
                    ball.y = paddle.y - ball.radius; 
                    
                    let relativeIntersectX = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                    let maxAngle = 60 * Math.PI / 180;
                    let bounceAngle = relativeIntersectX * maxAngle;

                    ball.dx = ball.currentSpeed * Math.sin(bounceAngle);
                    ball.dy = -ball.currentSpeed * Math.cos(bounceAngle);
                    playSound('paddle');
                } else {
                    ball.y = nextY;
                }
            } else {
                ball.y = nextY;
            }

            let allCleared = true;
            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    let b = bricks[r][c];
                    if (b.status === 1) {
                        allCleared = false;

                        let closestX = Math.max(b.x, Math.min(ball.x, b.x + b.width));
                        let closestY = Math.max(b.y, Math.min(ball.y, b.y + b.height));

                        let distanceX = ball.x - closestX;
                        let distanceY = ball.y - closestY;
                        let distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                        if (distanceSquared < (ball.radius * ball.radius)) {
                            b.status = 0;
                            score += 10;
                            brokenBricksCount++; 
                            document.getElementById('live-score').innerText = score;
                            playSound('brick');

                            if (closestX === b.x || closestX === b.x + b.width) {
                                ball.dx = -ball.dx;
                            } else {
                                ball.dy = -ball.dy;
                            }
                            
                            // True Smooth Linear Acceleration Formula
                            let speedRatio = brokenBricksCount / totalBricksCount;
                            ball.currentSpeed = ball.minSpeed + (ball.maxSpeed - ball.minSpeed) * speedRatio;

                            let currentAngle = Math.atan2(ball.dy, ball.dx);
                            ball.dx = Math.cos(currentAngle) * ball.currentSpeed;
                            ball.dy = Math.sin(currentAngle) * ball.currentSpeed;
                            break; 
                        }
                    }
                }
            }

            if (allCleared && bricks.length > 0) {
                endGame(true);
            }

            if (ball.y > V_HEIGHT + ball.radius) {
                triggerRespawn();
            }
        }

        function endGame(isWin) {
            gameActive = false;
            cancelAnimationFrame(animationFrameId);
            
            let currentHighScore = localStorage.getItem('brick_highscore') || 0;
            if (score > currentHighScore) {
                currentHighScore = score;
                localStorage.setItem('brick_highscore', currentHighScore);
            }

            if (isWin) {
                document.getElementById('victory-score').innerText = score;
                playSound('win'); 
                switchScreen('celebration-screen'); 
                initCelebrationVisuals();
                updateCelebrationBackground();
            } else {
                document.getElementById('end-title').innerText = "GAME OVER";
                document.getElementById('end-title').style.color = "var(--primary)";
                document.getElementById('final-score').innerText = score;
                document.getElementById('high-score').innerText = currentHighScore;

                document.getElementById('app-container').classList.add('screen-shake');
                setTimeout(() => {
                    document.getElementById('app-container').classList.remove('screen-shake');
                }, 300);

                playSound('lose');
                switchScreen('end-screen');
                
                initMenuVisuals();
                updateMenuBackground();
            }
        }

        // --- Render Routine ---
        function renderScene() {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

            // Draw Bricks
            for (let r = 0; r < brickConfig.rows; r++) {
                for (let c = 0; c < brickConfig.cols; c++) {
                    let b = bricks[r][c];
                    if (b.status === 1) {
                        ctx.fillStyle = b.color;
                        ctx.beginPath();
                        ctx.roundRect(b.x, b.y, b.width, b.height, 5);
                        ctx.fill();
                    }
                }
            }

            // Draw Paddle
            ctx.fillStyle = '#4ecdc4';
            ctx.beginPath();
            ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
            ctx.fill();

            // Draw Ball (Locked aspect box parameters guarantee a perfect round circle)
            if (ballVisible) {
                ctx.fillStyle = '#ff6b6b';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            runPhysicsStep();
            renderScene();
            animationFrameId = requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
